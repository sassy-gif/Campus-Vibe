<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Vibes</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🔝 NAVBAR -->
  <header class="navbar">
    <div class="logo">Campus Vibes</div>

    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Spots</a>
      <a href="#">Blog</a>
      <span class="icon">☕</span>
    </nav>
  </header>

  <!-- 🏠 HERO SECTION -->
  <section class="hero">
    <h1>Find Your Perfect Spot on Campus</h1>
    <p>Cafes, food, and hidden gems around Haramaya</p>
    <button class="explore-btn">Explore Spots</button>
  </section>

  <!-- 🔍 FILTER + SEARCH -->
  <section class="controls">
    <div class="filters">
      <button class="filter-btn active">All</button>
      <button class="filter-btn">Cafe</button>
      <button class="filter-btn">Food</button>
      <button class="filter-btn">Coffee </button>
      <button class="filter-btn">Shop</button>
    </div>

    <input type="text" placeholder="Search spots..." class="search-bar">
  </section>

  <!-- 🧩 SPOTS SECTION -->
  <section class="spots-container">

    <!-- Example Card -->
    <div class="card">
      <img src="images/cafe1.jpg" alt="Cafe">
      <h3>Campus Cafe</h3>
      <p></p>
    </div>

    <div class="card">
      <img src="images/food1.jpg" alt="Food">
      <h3>Student Cafeteria</h3>
      <p>Cheap but always busy</p>
    </div>

    <div class="card">
      <img src="images/shop1.jpg" alt="Shop">
      <h3>Mini Market</h3>
      <p>Quick snacks and essentials</p>
    </div>

  </section>

  <!-- 📜 FOOTER -->
  <footer class="footer">
    <p>© 2026 Campus Vibes | Haramaya University</p>
  </footer>

</body>
</html>
